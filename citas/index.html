<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#f5ede0" />
  <title>Registro de citas</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <div class="panel">
    <h1>Registro de citas</h1>
    <p class="lead">Todo lo que se ha contestado en el formulario. Página no listada.</p>

    <div class="toolbar">
      <span class="count" id="count">Cargando…</span>
      <a class="dl" href="../data/citas.xlsx" download><span data-icon="send"></span> Excel (.xlsx)</a>
      <a class="dl" href="../data/citas.csv" download><span data-icon="send"></span> CSV</a>
      <a class="dl" href="../data/citas.json" download><span data-icon="send"></span> JSON</a>
    </div>

    <div class="table-wrap">
      <table class="citas">
        <thead>
          <tr>
            <th>Fecha y hora</th>
            <th>Vamos a</th>
            <th>Horario</th>
            <th>Me apetece</th>
            <th>Ubicación</th>
            <th>Sitio</th>
          </tr>
        </thead>
        <tbody id="rows">
          <tr><td colspan="6" class="empty">Cargando registro…</td></tr>
        </tbody>
      </table>
    </div>

    <a class="back-home" href="../"><span data-icon="back"></span> volver a la app</a>
  </div>

  <script src="../js/icons.js"></script>
  <script>
    'use strict';

    // Pinta iconos SVG
    document.querySelectorAll('[data-icon]').forEach((el) => {
      el.innerHTML = window.svgIcon(el.dataset.icon, 'icon');
    });

    function esc(s) { const d = document.createElement('div'); d.textContent = s == null ? '' : s; return d.innerHTML; }

    function fechaHora(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (isNaN(d)) return esc(iso);
      return d.toLocaleString('es-ES', {
        day: '2-digit', month: '2-digit', year: 'numeric',
        hour: '2-digit', minute: '2-digit',
      });
    }

    async function cargar() {
      const rows = document.getElementById('rows');
      const count = document.getElementById('count');
      let data = [];
      try {
        // cache-buster para ver siempre lo último tras cada commit del bot
        const res = await fetch('../data/citas.json?_=' + Date.now());
        data = await res.json();
        if (!Array.isArray(data)) data = [];
      } catch {
        rows.innerHTML = '<tr><td colspan="6" class="empty">No se pudo cargar el registro.</td></tr>';
        count.textContent = '';
        return;
      }

      count.textContent = data.length + (data.length === 1 ? ' cita' : ' citas');

      if (!data.length) {
        rows.innerHTML = '<tr><td colspan="6" class="empty">Aún no hay citas registradas. 🙂</td></tr>';
        return;
      }

      // más recientes primero
      data.sort((a, b) => String(b.fecha).localeCompare(String(a.fecha)));

      rows.innerHTML = data.map((r) => `
        <tr>
          <td>${fechaHora(r.fecha)}</td>
          <td>${esc(r.plan)}</td>
          <td>${esc(r.franja)}</td>
          <td>${esc(r.antojo)}</td>
          <td>${esc(r.ciudad)}</td>
          <td class="wrap">${esc(r.sitio)}</td>
        </tr>`).join('');
    }

    cargar();
  </script>
</body>
</html>
