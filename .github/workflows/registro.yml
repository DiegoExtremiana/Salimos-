name: Registrar cita

# Se dispara cuando la web envía un repository_dispatch de tipo "nueva-cita".
on:
  repository_dispatch:
    types: [nueva-cita]

permissions:
  contents: write        # necesario para hacer commit del registro

concurrency:
  group: registro        # evita commits pisándose si llegan varias a la vez
  cancel-in-progress: false

jobs:
  guardar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Añadir registro (CSV + JSON)
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: node .github/scripts/append.js

      - name: Commit y push
        run: |
          git config user.name "cita-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/citas.csv data/citas.json
          if git diff --staged --quiet; then
            echo "Sin cambios que guardar."
          else
            git commit -m "registro: nueva cita ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
